services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fauke
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fauke_prod_2026}
      POSTGRES_DB: fauke
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fauke"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No ports exposed — internal only

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://fauke:${DB_PASSWORD:-fauke_prod_2026}@db:5432/fauke?schema=public
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:-fauke-prod-secret-change-me}
      FAUKE_CONFIG_ENCRYPTION_KEY: ${FAUKE_CONFIG_ENCRYPTION_KEY:-change-me-32-bytes-minimum}
      FAUKE_WEBHOOK_SECRET: ${FAUKE_WEBHOOK_SECRET:-change-me-webhook-secret}
      FAUKE_INTEGRATION_RATE_LIMIT_WINDOW_MS: ${FAUKE_INTEGRATION_RATE_LIMIT_WINDOW_MS:-60000}
      FAUKE_INTEGRATION_RATE_LIMIT_TEST_MAX: ${FAUKE_INTEGRATION_RATE_LIMIT_TEST_MAX:-10}
      FAUKE_INTEGRATION_RATE_LIMIT_SYNC_MAX: ${FAUKE_INTEGRATION_RATE_LIMIT_SYNC_MAX:-5}
      FAUKE_INTEGRATION_RETRY_COUNT: ${FAUKE_INTEGRATION_RETRY_COUNT:-2}
      FAUKE_INTEGRATION_RETRY_INITIAL_DELAY_MS: ${FAUKE_INTEGRATION_RETRY_INITIAL_DELAY_MS:-300}
      # Per-provider adapter mode: mock|real
      FAUKE_FORTNOX_ADAPTER: ${FAUKE_FORTNOX_ADAPTER:-mock}
      FAUKE_VISMA_ADAPTER: ${FAUKE_VISMA_ADAPTER:-mock}
      FAUKE_PE_ACCOUNTING_ADAPTER: ${FAUKE_PE_ACCOUNTING_ADAPTER:-mock}
      # OAuth credentials from env variables
      FORTNOX_OAUTH_CLIENT_ID: ${FORTNOX_OAUTH_CLIENT_ID}
      FORTNOX_OAUTH_CLIENT_SECRET: ${FORTNOX_OAUTH_CLIENT_SECRET}
      VISMA_OAUTH_CLIENT_ID: ${VISMA_OAUTH_CLIENT_ID}
      VISMA_OAUTH_CLIENT_SECRET: ${VISMA_OAUTH_CLIENT_SECRET}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
